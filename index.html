<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editor de eBook</title>

<style>

body{
font-family:Arial;
background:#111;
color:#eee;
margin:0;
}

.toolbar{
background:#1c1c1c;
padding:10px;
position:sticky;
top:0;
display:flex;
gap:10px;
border-bottom:1px solid #333;
}

button{
background:#2c2c2c;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#444;
}

.container{
display:flex;
justify-content:center;
}

.book{
width:820px;
background:white;
color:black;
padding:40px;
margin:40px;
box-shadow:0 0 20px rgba(0,0,0,0.7);
}

.page{
page-break-after:always;
margin-bottom:60px;
}

.cover{
height:1000px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background-size:cover;
background-position:center;
color:white;
}

.cover-overlay{
background:rgba(0,0,0,0.6);
padding:60px;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.cover h1{
font-size:48px;
margin:20px;
}

.cover h2{
font-size:24px;
font-weight:normal;
}

.editor{
min-height:200px;
border:1px dashed #aaa;
padding:20px;
}

img{
max-width:100%;
margin:10px 0;
}

@media print{

body{
background:white;
}

.toolbar{
display:none;
}

.book{
box-shadow:none;
margin:0;
width:100%;
}

}

</style>

</head>

<body>

<div class="toolbar">

<button onclick="addChapter()">Novo Capítulo</button>

<button onclick="addImage()">Inserir Imagem</button>

<button onclick="generateSummary()">Gerar Sumário</button>

<button onclick="printBook()">Exportar PDF</button>

<input type="file" id="coverUpload" accept="image/*">

</div>

<div class="container">

<div class="book" id="book">

<div class="page cover" id="cover">

<div class="cover-overlay">

<h1 contenteditable="true">Título do Livro</h1>

<h2 contenteditable="true">Autor</h2>

</div>

</div>

<div class="page" id="summary">

<h2>Sumário</h2>

<ul id="summaryList"></ul>

</div>

<div class="page chapter">

<h2 contenteditable="true">Capítulo 1</h2>

<div class="editor" contenteditable="true">

Comece a escrever seu livro aqui...

</div>

</div>

</div>

</div>

<script>

function addChapter(){

let book = document.getElementById("book")

let count = document.querySelectorAll(".chapter").length + 1

let chapter = document.createElement("div")

chapter.className="page chapter"

chapter.innerHTML=`

<h2 contenteditable="true">Capítulo ${count}</h2>

<div class="editor" contenteditable="true">

Escreva o conteúdo...

</div>

`

book.appendChild(chapter)

}

function generateSummary(){

let list = document.getElementById("summaryList")

list.innerHTML=""

let chapters=document.querySelectorAll(".chapter h2")

chapters.forEach((c,i)=>{

let li=document.createElement("li")

li.innerText=c.innerText

list.appendChild(li)

})

}

function addImage(){

let input=document.createElement("input")

input.type="file"

input.accept="image/*"

input.onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

let img=document.createElement("img")

img.src=ev.target.result

document.activeElement.appendChild(img)

}

reader.readAsDataURL(file)

}

input.click()

}

function printBook(){

window.print()

}

document.getElementById("coverUpload").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

document.getElementById("cover").style.backgroundImage=`url(${ev.target.result})`

}

reader.readAsDataURL(file)

})

</script>

</body>
</html>
